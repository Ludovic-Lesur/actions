name: Generate release notes
description: 'Generate release notes containing the list of commits since last release'
inputs:
  github_token:
    description: "GitHub token"
    required: true
outputs:
  release_body:
    description: "Output text for release body"
    value: ${{ steps.generate.outputs.release_body }}
runs:
  using: "composite"
  steps:
    - name: Generate release notes
      id: generate
      uses: actions/github-script@v6
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const currentTag = process.env.GITHUB_REF?.replace('refs/tags/','');
          if(!currentTag) {
            core.setFailed('No tag found in GITHUB_REF');
            return;
          }
          const currentTagRefResp = await github.rest.git.getRef({ owner, repo, ref: `tags/${currentTag}` });
          let currentCommitSha;
          if (currentTagRefResp.data.object.type === 'tag') {
            const currentTagObjResp = await github.rest.git.getTag({ owner, repo, tag_sha: currentTagRefResp.data.object.sha });
            if (currentTagObjResp.data.object.type !== 'commit') {
              core.setFailed(`Tag ${currentTag} does not point to a commit`);
              return;
            }
            currentCommitSha = currentTagObjResp.data.object.sha;
          }
          else {
            currentCommitSha = currentTagRefResp.data.object.sha;
          }
          const refsResp = await github.paginate(github.rest.git.listMatchingRefs, { owner, repo, ref: 'tags/' });
          const tags = refsResp
          .filter(t => t.ref?.startsWith('refs/tags/'))
          .map(t => ({ name: t.ref.replace('refs/tags/', ''), object: t.object }));
          const tagInfos = [];
          for (const t of tags) {
            try {
              if (t.object?.type !== 'tag') continue;
              const tagResp = await github.rest.git.getTag({ owner, repo, tag_sha: t.object.sha });
              if (tagResp.data.object?.type !== 'commit') continue;
              const commitResp = await github.rest.repos.getCommit({ owner, repo, ref: tagResp.data.object.sha });
              const date = tagResp.data.tagger?.date || commitResp.data.commit.author?.date || commitResp.data.commit.committer?.date || null;
              const sha = commitResp.data.sha;
              tagInfos.push({ name: t.name, date, sha });
            }
            catch(e) {}
          }
          // sort by date descending (newest first)
          tagInfos.sort((a, b) => {
            const da = a.date ? new Date(a.date).getTime() : 0;
            const db = b.date ? new Date(b.date).getTime() : 0;
            return db - da;
          });
          const idx = tagInfos.findIndex(t => t.name === currentTag);
          let previousTag = null;
          if (idx >= 0) {
            for (let i = idx + 1; i < tagInfos.length; i++) {
              if (tagInfos[i].sha !== currentCommitSha) {
                previousTag = tagInfos[i].name;
                break;
              }
            }
          }
          let commits = [];
          if (previousTag) {
            const comp = await github.rest.repos.compareCommits({ owner, repo, base: previousTag, head: currentTag });
            commits = comp.data.commits || [];
          }
          else {
            const list = await github.rest.repos.listCommits({ owner, repo, per_page: 250, sha: currentTag });
            commits = list.data || [];
          }
          commits.sort((a, b) => {
            const getTime = c => {
              const d = (c.commit && c.commit.author && c.commit.author.date) || (c.commit && c.commit.committer && c.commit.committer.date) || null;
              return d ? new Date(d).getTime() : 0;
            };
            return getTime(b) - getTime(a);
          });
          let commitsText;
          if (!commits || commits.length === 0) {
            commitsText = '- (no commits found)';
          }
          else {
            commitsText = commits.map(c => {
              const subj = (c.commit && c.commit.message) ? c.commit.message.split('\\n')[0] : '(no message)';
              const short = (c.sha || '').slice(0,7);
              const author = (c.commit && c.commit.author && c.commit.author.name) || (c.author && c.author.login) || 'unknown';
              const dateRaw = (c.commit && c.commit.author && c.commit.author.date) || (c.commit && c.commit.committer && c.commit.committer.date) || null;
              let dateTime = 'unknown date';
              if (dateRaw) {
                const iso = new Date(dateRaw).toISOString();
                const d = iso.split('T')[0];
                const t = iso.split('T')[1].slice(0,5);
                dateTime = `${d} ${t} UTC`;
              }
              return `- ${dateTime} - **${subj}** (${short}) by ${author}`;
            }).join('\n');
          }
          const header = previousTag ? `Changes since previous release (${previousTag}):` : `Changes from project creation:`;
          const body = `${header}
          ${commitsText}`;
          core.setOutput('release_body', body);
